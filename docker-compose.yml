version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: neuromarketer
      POSTGRES_USER: neuromarketer
      POSTGRES_PASSWORD: neuromarketer
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neuromarketer -d neuromarketer"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb -p local/neuromarketing-dev || true
      "

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - backend/.env.example
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - tribe_cache:/app/cache

  worker-inference:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: ["bash", "backend/run_workers.sh"]
    env_file:
      - backend/.env.example
    environment:
      CELERY_WORKER_ROLE: inference-cpu
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    volumes:
      - .:/app
      - tribe_cache:/app/cache

  worker-scoring:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: ["bash", "backend/run_workers.sh"]
    env_file:
      - backend/.env.example
    environment:
      CELERY_WORKER_ROLE: scoring-cpu
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    volumes:
      - .:/app
      - tribe_cache:/app/cache

volumes:
  postgres_data:
  minio_data:
  tribe_cache:
