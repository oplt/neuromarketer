version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_net

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_net

  minio-init:
    image: minio/mc:latest
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
      mc mb -p local/$$MINIO_BUCKET || true
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      MINIO_BUCKET: ${MINIO_BUCKET:-neuromarketing-prod}
    networks:
      - app_net

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    command: >
      gunicorn backend.api.main:app
      -k uvicorn.workers.UvicornWorker
      --bind 0.0.0.0:8000
      --workers ${API_WORKERS:-2}
      --timeout ${API_TIMEOUT:-120}
    env_file:
      - backend/.env.production
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      S3_ENDPOINT_URL: http://minio:9000
      S3_BUCKET: ${MINIO_BUCKET:-neuromarketing-prod}
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      ENVIRONMENT: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    volumes:
      - tribe_cache:/app/cache
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/health\", timeout=5)'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - app_net

  worker-inference:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    command: >
      celery -A backend.celery_app.celery_app worker
      -Q analysis-inference
      --prefetch-multiplier=${CELERY_INFERENCE_WORKER_PREFETCH_MULTIPLIER:-1}
      --concurrency=${CELERY_INFERENCE_CONCURRENCY:-1}
      --loglevel=info
    env_file:
      - backend/.env.production
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      S3_ENDPOINT_URL: http://minio:9000
      S3_BUCKET: ${MINIO_BUCKET:-neuromarketing-prod}
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      ENVIRONMENT: production
      CELERY_WORKER_ROLE: inference
      CELERY_INFERENCE_WORKER_PREFETCH_MULTIPLIER: ${CELERY_INFERENCE_WORKER_PREFETCH_MULTIPLIER:-1}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    volumes:
      - tribe_cache:/app/cache
    networks:
      - app_net

  worker-scoring:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    command: >
      celery -A backend.celery_app.celery_app worker
      -Q analysis-scoring
      --prefetch-multiplier=${CELERY_SCORING_WORKER_PREFETCH_MULTIPLIER:-4}
      --concurrency=${CELERY_SCORING_CONCURRENCY:-4}
      --loglevel=info
    env_file:
      - backend/.env.production
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      S3_ENDPOINT_URL: http://minio:9000
      S3_BUCKET: ${MINIO_BUCKET:-neuromarketing-prod}
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      ENVIRONMENT: production
      CELERY_WORKER_ROLE: scoring
      CELERY_SCORING_WORKER_PREFETCH_MULTIPLIER: ${CELERY_SCORING_WORKER_PREFETCH_MULTIPLIER:-4}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    volumes:
      - tribe_cache:/app/cache
    networks:
      - app_net

volumes:
  postgres_data:
  redis_data:
  minio_data:
  tribe_cache:

networks:
  app_net:
    driver: bridge